services:
  sam3-api:
    build:
      context: ./service
    env_file:
      - .env
    ports:
      - "127.0.0.1:${SAM3_LOCAL_PORT:-18106}:8000"
    gpus: all
    environment:
      NVIDIA_VISIBLE_DEVICES: "${NVIDIA_VISIBLE_DEVICES:-all}"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
    volumes:
      - "${AIHUB_MODELS_DIR:-/DATA/models}/sam3:/models/sam3"
      - "${AIHUB_CACHE_DIR:-../../data/cache}/sam3:/cache/sam3"
      - "${SERVICE_DATA_DIR:-../../data/services/sam3-main}:/data/service"
