services:
  nemotron-rag:
    build:
      context: ./service
    image: 3waaihub-nemotron-rag:0.1.0
    env_file:
      - .env
    gpus: all
    environment:
      NVIDIA_VISIBLE_DEVICES: "${GPU_VISIBLE_DEVICES:-all}"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
    ports:
      - "127.0.0.1:${NEMOTRON_RAG_LOCAL_PORT:-18111}:8000"
    restart: unless-stopped
    volumes:
      - "${AIHUB_MODELS_DIR:-/DATA/models}/nemotron:/models/nemotron"
      - "${AIHUB_CACHE_DIR:-./data/cache}/nemotron:/cache/nemotron"
      - "${SERVICE_DATA_DIR:-./data/services/nemotron-rag}:/data/service"
