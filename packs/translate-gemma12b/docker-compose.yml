services:
  translator-api:
    build:
      context: ./service
    env_file:
      - .env
    ports:
      - "127.0.0.1:${TRANSLATE_LOCAL_PORT:-18102}:8000"
    gpus: all
    environment:
      NVIDIA_VISIBLE_DEVICES: "${NVIDIA_VISIBLE_DEVICES:-all}"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
    volumes:
      - "${AIHUB_MODELS_DIR:-/DATA/models}/ollama:/root/.ollama"
