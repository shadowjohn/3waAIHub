services:
  image-birefnet:
    build:
      context: ./service
    ports:
      - "127.0.0.1:${BIREFNET_LOCAL_PORT:-18112}:8000"
    environment:
      BIREFNET_USE_GPU: ${BIREFNET_USE_GPU:-1}
      BIREFNET_DEVICE: ${BIREFNET_DEVICE:-auto}
      BIREFNET_CPU_FALLBACK: ${BIREFNET_CPU_FALLBACK:-1}
      BIREFNET_MODEL_DIR: /models/birefnet
      BIREFNET_CACHE_DIR: /cache/birefnet
      BIREFNET_SERVICE_DATA_DIR: /data/service
      BIREFNET_MAX_UPLOAD_MB: ${BIREFNET_MAX_UPLOAD_MB:-50}
      HF_HOME: /models/birefnet/huggingface
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
      XDG_CACHE_HOME: /cache/birefnet/xdg
      HOME: /cache/birefnet/home
      PYTHONUNBUFFERED: "1"
    gpus: all
    volumes:
      - "${AIHUB_MODELS_DIR:-/DATA/models}/birefnet:/models/birefnet"
      - "${AIHUB_CACHE_DIR:-/DATA/3waAIHub/data/cache}/birefnet:/cache/birefnet"
      - "${SERVICE_DATA_DIR:-/DATA/3waAIHub/data/services/birefnet-main}:/data/service"
