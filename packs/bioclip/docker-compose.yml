services:
  bioclip:
    build:
      context: ./service
    ports:
      - "127.0.0.1:${BIOCLIP_LOCAL_PORT:-18111}:8000"
    environment:
      BIOCLIP_MODEL_DIR: /models/bioclip
      BIOCLIP_CACHE_DIR: /cache/bioclip
      BIOCLIP_SERVICE_DATA_DIR: /data/service
      BIOCLIP_MODEL: ${BIOCLIP_MODEL:-hf-hub:imageomics/bioclip}
      BIOCLIP_DEVICE: ${BIOCLIP_DEVICE:-cuda}
      BIOCLIP_REAL_INFERENCE: ${BIOCLIP_REAL_INFERENCE:-1}
      BIOCLIP_TOP_K: ${BIOCLIP_TOP_K:-5}
      HF_HOME: /models/bioclip/huggingface
      XDG_CACHE_HOME: /cache/bioclip/xdg
      HOME: /cache/bioclip/home
      PYTHONUNBUFFERED: "1"
    gpus: all
    volumes:
      - "${AIHUB_MODELS_DIR:-/DATA/models}/bioclip:/models/bioclip"
      - "${AIHUB_CACHE_DIR:-/DATA/3waAIHub/data/cache}/bioclip:/cache/bioclip"
      - "${SERVICE_DATA_DIR:-/DATA/3waAIHub/data/services/bioclip-main}:/data/service"
