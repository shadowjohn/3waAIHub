services:
  yolo-api:
    build:
      context: ./service
    env_file:
      - .env
    ports:
      - "127.0.0.1:${YOLO_LOCAL_PORT:-18105}:8000"
    gpus: all
    environment:
      NVIDIA_VISIBLE_DEVICES: "${NVIDIA_VISIBLE_DEVICES:-all}"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
    volumes:
      - "${AIHUB_MODELS_DIR:-/DATA/models}/yolo:/models/yolo"
      - "${AIHUB_CACHE_DIR:-../../data/cache}/ultralytics:/cache/ultralytics"
      - "${SERVICE_DATA_DIR:-../../data/services/yolo-main}:/data/service"
