services:
  yolo-api:
    build:
      context: ./service
    env_file:
      - .env
    ports:
      - "127.0.0.1:${YOLO_LOCAL_PORT:-18105}:8000"
    volumes:
      - "${AIHUB_MODELS_DIR:-/DATA/models}/yolo:/models/yolo"
      - "${AIHUB_CACHE_DIR:-../../data/cache}/yolo:/cache/yolo"
      - "${SERVICE_DATA_DIR:-../../data/services/yolo-main}:/data/service"
