services:
  whisper-asr:
    build:
      context: .
      dockerfile: service/Dockerfile
    image: 3waaihub/whisper-asr:0.1.1
    env_file:
      - .env
    gpus: all
    environment:
      NVIDIA_VISIBLE_DEVICES: "${GPU_VISIBLE_DEVICES:-all}"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
    ports:
      - "127.0.0.1:${ASR_LOCAL_PORT:-18107}:8000"
    volumes:
      - "${AIHUB_MODELS_DIR}/whisper:/models/whisper"
      - "${AIHUB_CACHE_DIR}/whisper:/cache/whisper"
      - "${SERVICE_DATA_DIR}:/data/service"
