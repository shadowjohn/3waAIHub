services:
  ocr-ppocrv5:
    build:
      context: ./service
    env_file:
      - .env
    ports:
      - "127.0.0.1:${OCR_LOCAL_PORT:-18101}:8000"
    volumes:
      - "${AIHUB_MODELS_DIR}/paddleocr:/models/paddleocr"
      - "${AIHUB_CACHE_DIR}/paddleocr:/cache/paddleocr"
      - "${SERVICE_DATA_DIR}:/data/service"
