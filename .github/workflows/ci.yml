name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ref info
        run: |
          echo "GITHUB_REF=$GITHUB_REF"
          echo "GITHUB_SHA=$GITHUB_SHA"

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: sqlite3, pdo_sqlite, curl

      - name: PHP lint
        run: find . -path './data' -prune -o -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Tests
        run: |
          set -o pipefail
          php scripts/run_tests.php 2>&1 | tee run_tests.log

      - name: Self check
        run: |
          set -o pipefail
          php \
            -d zend.assertions=1 \
            -d assert.exception=1 \
            -d display_errors=1 \
            -d error_reporting=E_ALL \
            scripts/self_check.php 2>&1 | tee self_check.log

      - name: Shell syntax
        run: bash -n install.sh scripts/*.sh crontab/*.sh

      - name: Diff check
        run: git diff --check

      - name: Upload CI logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs
          path: |
            run_tests.log
            self_check.log
